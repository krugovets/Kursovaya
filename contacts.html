<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — Angelina Telpuk</title>
  <link rel="icon" href="Reolization/camera.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page page--contacts" data-page="contacts">
  <header class="site-header" role="banner">
    <div class="site-header__inner">
      <p class="site-brand">ANGELINA TELPUK</p>
      <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Открыть меню">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Основная навигация">
        <ul class="site-nav__list">
          <li><a href="index.html">Главная</a></li>
          <li><a href="portfolio.html">Портфолио</a></li>
          <li><a href="contacts.html">Контакты</a></li>
          <li><a href="questions.html">Вопросы</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <section class="contact-hero" aria-labelledby="contacts-title">
      <div class="contact-hero__grid">
        <figure class="contact-hero__photo">
          <img src="Ангелина/IMG_6840.jpeg" alt="Angelina Telpuk" width="900" height="1100" loading="lazy">
        </figure>
        <div class="contact-hero__content">
          <h1 class="page-head__title" id="contacts-title">Контакты</h1>
          <p class="contact-hero__phone-wrap">
            <button type="button" class="phone-copy" id="phone-copy" data-phone="+375293157155">+375293157155</button>
            <span class="hint" id="phone-hint">Нажмите, чтобы скопировать номер</span>
          </p>
          <form class="contact-form contact-form--lines" id="contact-form" action="https://formsubmit.co/akrugovets@icloud.com" method="POST" novalidate>
            <input type="hidden" name="_subject" value="Сообщение с сайта Angelina Telpuk">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <div class="field-line">
              <span class="field-line__label">Ваше имя</span>
              <input class="field-line__input" type="text" name="name" required autocomplete="name" placeholder=" ">
            </div>
            <div class="field-line">
              <span class="field-line__label">Электронная почта</span>
              <input class="field-line__input" type="email" name="email" required autocomplete="email" placeholder=" ">
            </div>
            <div class="field-line">
              <span class="field-line__label">Сообщение</span>
              <textarea class="field-line__input field-line__input--area" name="message" rows="4" required placeholder=" "></textarea>
            </div>
            <button type="submit" class="btn btn--pill btn--primary">Отправить</button>
          </form>
        </div>
      </div>
    </section>

    <section class="connect-block connect-block--row connect-block--plain" aria-label="Быстрые контакты">
      <div class="connect-actions connect-actions--pills connect-actions--row">
        <a class="pill-btn" href="https://t.me/Angelina_Telpuk" target="_blank" rel="noopener noreferrer">TELEGRAM</a>
        <a class="pill-btn" href="https://instagram.com/telpuk_photo" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a class="pill-btn" href="contacts.html#contact-form">ПОЧТА</a>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="site-footer__inner">
      <p class="site-footer__copy">© 2026 Angelina Telpuk. Все фотографии защищены авторским правом</p>
      <ul class="site-footer__social" aria-label="Соцсети и почта">
        <li>
          <a class="icon-link" href="mailto:akrugovets@icloud.com" title="Почта">
            <img src="Reolization/mail.svg" alt="" width="18" height="18">
          </a>
        </li>
        <li>
          <a class="icon-link" href="https://t.me/Angelina_Telpuk" target="_blank" rel="noopener noreferrer" title="Telegram">
            <img src="Reolization/telegram.svg" alt="" width="18" height="18">
          </a>
        </li>
        <li>
          <a class="icon-link" href="https://instagram.com/telpuk_photo" target="_blank" rel="noopener noreferrer" title="Instagram">
            <img src="Reolization/instagram.svg" alt="" width="18" height="18">
          </a>
        </li>
      </ul>
    </div>
  </footer>

  <div class="fab" aria-label="Быстрые действия">
    <button type="button" class="fab__btn" id="fab-scroll" title="Наверх" aria-label="Прокрутка наверх">
      <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 5l7 7h-4v7H9v-7H5l7-7z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="js/main.js" defer></script>
</body>
</html>
